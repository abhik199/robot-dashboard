<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | EcoosoftStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <nav class="fixed top-0 left-0 right-0 z-50 glass shadow-sm">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between font-bold">
            <a href="index.html" class="text-2xl font-extrabold tracking-tighter">Ecoosoft<span class="text-sky-500">Store</span></a>
            <div class="flex items-center gap-6">
                <a href="products.html" class="text-slate-600 hover:text-sky-600 transition-colors">Back to Shop</a>
                <button id="menu-btn" class="md:hidden text-slate-600">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Menu Overlay -->
        <div id="mobile-menu" class="fixed inset-0 bg-slate-900/95 z-[100] flex flex-col items-center justify-center space-y-8 text-2xl font-black text-white hidden">
            <button id="close-menu" class="absolute top-8 right-8 text-white/50 hover:text-white">
                <i data-lucide="x" size="32"></i>
            </button>
            <a href="index.html" class="hover:text-sky-400 transition-colors">Home</a>
            <a href="products.html" class="hover:text-sky-400 transition-colors">Products</a>
            <a href="about.html" class="hover:text-sky-400 transition-colors">About</a>
            <a href="contact.html" class="hover:text-sky-400 transition-colors">Contact</a>
        </div>
    </nav>

    <section class="pt-32 pb-20">
        <div class="container mx-auto px-6 max-w-5xl">
            <h1 class="text-4xl font-black text-slate-900 mb-12">Your Shopping Cart</h1>
            
            <div id="cart-container" class="flex flex-col lg:flex-row gap-12">
                <!-- Cart content will be injected here -->
            </div>
        </div>
    </section>

    <script src="main.js"></script>
    <script>
        function removeFromCartLocal(id) {
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('ecoCart', JSON.stringify(cart));
            renderCart();
            updateCartCount();
        }

        function renderCart() {
            const container = document.getElementById('cart-container');
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="w-full text-center py-20 bg-white rounded-[40px] border border-slate-100 shadow-sm">
                        <i data-lucide="shopping-bag" class="mx-auto mb-6 text-slate-200" size="64"></i>
                        <h2 class="text-2xl font-bold mb-6 text-slate-400">Your cart is empty</h2>
                        <a href="products.html" class="bg-sky-500 text-white px-8 py-4 rounded-2xl font-black hover:bg-sky-600 transition-all inline-block">Start Shopping</a>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            container.innerHTML = `
                <div class="lg:w-2/3 space-y-4">
                    ${cart.map(item => `
                        <div class="bg-white p-6 rounded-3xl border border-slate-100 flex items-center justify-between gap-6 group">
                            <img src="${item.image}" class="w-24 h-24 object-cover rounded-2xl" alt="">
                            <div class="flex-1">
                                <h4 class="font-bold text-lg text-slate-900 line-clamp-1">${item.name}</h4>
                                <p class="text-sky-600 font-black">₹${item.price} x ${item.quantity}</p>
                            </div>
                            <button onclick="removeFromCartLocal('${item.id}')" class="p-3 text-slate-300 hover:text-red-500 transition-colors">
                                <i data-lucide="trash-2"></i>
                            </button>
                        </div>
                    `).join('')}
                </div>
                <div class="lg:w-1/3">
                    <div class="bg-white p-8 rounded-[40px] border border-slate-100 shadow-sm sticky top-32">
                        <h3 class="text-xl font-black mb-8 border-b border-slate-100 pb-4">Order Summary</h3>
                        <div class="space-y-4 mb-8">
                            <div class="flex justify-between font-bold text-slate-500">
                                <span>Subtotal</span>
                                <span class="text-slate-900">₹${subtotal}</span>
                            </div>
                            <div class="flex justify-between font-bold text-slate-500">
                                <span>Shipping</span>
                                <span class="text-green-500">FREE</span>
                            </div>
                        </div>
                        <div class="flex justify-between font-black text-2xl mb-10 border-t border-slate-100 pt-6">
                            <span>Total</span>
                            <span class="text-sky-600">₹${subtotal}</span>
                        </div>
                        <button onclick="alert('Order successfully placed! Use Flipkart links for checkout.')" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-black transition-all shadow-xl shadow-slate-100">
                            Process Checkout
                        </button>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
