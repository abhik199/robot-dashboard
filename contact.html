<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | EcoosoftStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <nav class="fixed top-0 left-0 right-0 z-50 glass shadow-sm">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-extrabold tracking-tighter">Ecoosoft<span class="text-sky-500">Store</span></a>
            <div class="hidden md:flex items-center space-x-8 font-bold text-slate-600">
                <a href="index.html" class="hover:text-sky-600 transition-colors">Home</a>
                <a href="products.html" class="hover:text-sky-600 transition-colors">Products</a>
                <a href="about.html" class="hover:text-sky-600 transition-colors">About</a>
                <a href="contact.html" class="text-sky-600">Contact</a>
            </div>
        </div>
    </nav>

    <section class="pt-48 pb-32">
        <div class="container mx-auto px-6 text-center">
            <h1 class="text-6xl font-black mb-12 text-slate-900 leading-tight">Get In <span class="gradient-text">Touch</span></h1>
            
            <div class="max-w-4xl mx-auto flex flex-col md:flex-row bg-white rounded-[50px] shadow-sm overflow-hidden border border-slate-100">
                <div class="md:w-1/2 p-12 text-left bg-slate-900 text-white">
                    <h2 class="text-3xl font-black mb-8">Contact Info</h2>
                    <div class="space-y-8">
                        <div>
                            <p class="text-slate-400 font-bold uppercase text-xs mb-2">Our Address</p>
                            <p class="text-xl font-bold">Huzurganj, Madhya Pradesh, India</p>
                        </div>
                        <div>
                            <p class="text-slate-400 font-bold uppercase text-xs mb-2">Phone</p>
                            <p class="text-xl font-bold">+91 8461003767</p>
                        </div>
                        <div>
                            <p class="text-slate-400 font-bold uppercase text-xs mb-2">Email</p>
                            <p class="text-xl font-bold">support@ecoosoftstore.com</p>
                        </div>
                    </div>
                </div>
                <div class="md:w-1/2 p-12 text-left">
                    <form onsubmit="event.preventDefault(); alert('Message sent successfully!'); this.reset();" class="space-y-6">
                        <div>
                            <label class="block font-bold text-slate-900 mb-2">Full Name</label>
                            <input type="text" placeholder="Abhishek Kirar" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-6 focus:outline-none focus:ring-2 focus:ring-sky-500 font-medium">
                        </div>
                        <div>
                            <label class="block font-bold text-slate-900 mb-2">Message</label>
                            <textarea rows="4" placeholder="How can we help you?" required class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-6 focus:outline-none focus:ring-2 focus:ring-sky-500 font-medium resize-none"></textarea>
                        </div>
                        <button class="bg-sky-500 text-white w-full py-5 rounded-2xl font-black text-lg hover:bg-sky-600 transition-all shadow-xl shadow-sky-100">
                            Send Message
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-slate-900 text-slate-400 py-10 text-center border-t border-slate-800">
        <p>&copy; 2026 EcoosoftStore. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
