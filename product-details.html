<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | EcoosoftStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <nav class="fixed top-0 left-0 right-0 z-50 glass shadow-sm">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-extrabold tracking-tighter">Ecoosoft<span class="text-sky-500">Store</span></a>
            <div class="flex items-center space-x-6">
                <a href="cart.html" class="relative text-slate-600 hover:text-sky-600">
                    <i data-lucide="shopping-cart"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-sky-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
                </a>
                <button id="menu-btn" class="md:hidden text-slate-600">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Menu Overlay -->
        <div id="mobile-menu" class="fixed inset-0 bg-slate-900/95 z-[100] flex flex-col items-center justify-center space-y-8 text-2xl font-black text-white hidden">
            <button id="close-menu" class="absolute top-8 right-8 text-white/50 hover:text-white">
                <i data-lucide="x" size="32"></i>
            </button>
            <a href="index.html" class="hover:text-sky-400 transition-colors">Home</a>
            <a href="products.html" class="hover:text-sky-400 transition-colors">Products</a>
            <a href="about.html" class="hover:text-sky-400 transition-colors">About</a>
            <a href="contact.html" class="hover:text-sky-400 transition-colors">Contact</a>
        </div>
    </nav>

    <section class="pt-32 pb-20">
        <div id="product-details" class="container mx-auto px-6">
            <!-- Details will be injected here -->
        </div>
    </section>

    <script src="main.js"></script>
    <script>
        function changeImage(url) {
            document.getElementById('main-img').src = url;
            // Update active state of thumbnails
            document.querySelectorAll('.thumb-btn').forEach(btn => {
                if (btn.dataset.url === url) {
                    btn.classList.add('border-sky-500', 'ring-2', 'ring-sky-200');
                    btn.classList.remove('border-slate-100');
                } else {
                    btn.classList.remove('border-sky-500', 'ring-2', 'ring-sky-200');
                    btn.classList.add('border-slate-100');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const product = products.find(p => p.id === id);

            if (!product) {
                document.getElementById('product-details').innerHTML = '<h1 class="text-center text-4xl font-bold py-20">Product Not Found</h1>';
                return;
            }

            const descriptionHtml = product.description.split(' | ').map(item => `<li class="flex items-center gap-2"><span class="w-1.5 h-1.5 bg-sky-500 rounded-full"></span> ${item}</li>`).join('');

            document.getElementById('product-details').innerHTML = `
                <div class="flex flex-col lg:flex-row gap-16 bg-white p-6 md:p-12 rounded-[40px] shadow-sm border border-slate-100">
                    <div class="lg:w-1/2">
                        <div class="relative group">
                            <img id="main-img" src="${product.image}" class="w-full h-[400px] md:h-[600px] object-cover rounded-[32px] shadow-xl transition-all duration-500" alt="${product.name}">
                        </div>
                        ${product.images ? `
                            <div class="flex gap-4 mt-8 overflow-x-auto pb-4 custom-scrollbar">
                                ${product.images.map((img, idx) => `
                                    <button onclick="changeImage('${img}')" data-url="${img}" class="thumb-btn flex-shrink-0 w-20 h-20 rounded-2xl border-2 ${img === product.image ? 'border-sky-500 ring-2 ring-sky-200' : 'border-slate-100'} overflow-hidden hover:border-sky-300 transition-all">
                                        <img src="${img}" class="w-full h-full object-cover" alt="Thumbnail ${idx + 1}">
                                    </button>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                    <div class="lg:w-1/2 flex flex-col justify-center">
                        <span class="text-sky-500 font-bold uppercase tracking-widest text-xs mb-4">${product.category}</span>
                        <h1 class="text-4xl md:text-5xl font-black text-slate-900 mb-6 leading-tight">${product.name}</h1>
                        <p class="text-4xl font-black text-sky-600 mb-8">₹${product.price}</p>
                        
                        <div class="mb-10">
                            <h4 class="text-slate-900 font-black mb-4 flex items-center gap-2">
                                <i data-lucide="info" size="18"></i> Product Specifications
                            </h4>
                            <ul class="text-slate-500 space-y-3 font-semibold text-base">
                                ${descriptionHtml}
                            </ul>
                        </div>
                        
                        <div class="flex flex-col sm:flex-row gap-4 mb-12">
                            <button onclick="addToCart('${product.id}')" class="bg-slate-900 text-white px-10 py-5 rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-black transition-all shadow-2xl shadow-slate-200">
                                <i data-lucide="shopping-cart"></i> Add To Cart
                            </button>
                            <a href="${product.flipkartLink}" target="_blank" class="border-2 border-sky-500 text-sky-600 px-10 py-5 rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-sky-50 transition-all">
                                <i data-lucide="external-link"></i> Buy on Flipkart
                            </a>
                        </div>

                        <div class="grid grid-cols-2 gap-6 p-6 bg-slate-50 rounded-3xl border border-slate-100">
                            <div class="flex items-center gap-3 text-slate-700 font-bold text-sm">
                                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                                    <i data-lucide="truck" class="text-sky-500" size="18"></i>
                                </div>
                                Free Delivery
                            </div>
                            <div class="flex items-center gap-3 text-slate-700 font-bold text-sm">
                                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                                    <i data-lucide="shield-check" class="text-sky-500" size="18"></i>
                                </div>
                                Secure Checkout
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        });
    </script>
</body>
</html>
