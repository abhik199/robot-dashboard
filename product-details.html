<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | EcoosoftStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <nav class="fixed top-0 left-0 right-0 z-50 glass shadow-sm">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-extrabold tracking-tighter">Ecoosoft<span class="text-sky-500">Store</span></a>
            <div class="flex items-center space-x-6">
                <a href="cart.html" class="relative text-slate-600 hover:text-sky-600">
                    <i data-lucide="shopping-cart"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-sky-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
                </a>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20">
        <div id="product-details" class="container mx-auto px-6">
            <!-- Details will be injected here -->
        </div>
    </section>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const product = products.find(p => p.id === id);

            if (!product) {
                document.getElementById('product-details').innerHTML = '<h1 class="text-center text-4xl font-bold py-20">Product Not Found</h1>';
                return;
            }

            document.getElementById('product-details').innerHTML = `
                <div class="flex flex-col lg:flex-row gap-16 bg-white p-8 md:p-12 rounded-[40px] shadow-sm border border-slate-100">
                    <div class="lg:w-1/2">
                        <img src="${product.image}" class="w-full h-[500px] object-cover rounded-[32px] shadow-xl" alt="${product.name}">
                    </div>
                    <div class="lg:w-1/2 flex flex-col justify-center">
                        <span class="text-sky-500 font-bold uppercase tracking-widest text-sm mb-4">${product.category}</span>
                        <h1 class="text-4xl md:text-5xl font-black text-slate-900 mb-6">${product.name}</h1>
                        <p class="text-3xl font-black text-sky-600 mb-8">₹${product.price}</p>
                        <p class="text-slate-500 text-lg mb-10 leading-relaxed font-medium">${product.description}</p>
                        
                        <div class="flex flex-col sm:flex-row gap-4">
                            <button onclick="addToCart('${product.id}')" class="bg-slate-900 text-white px-10 py-5 rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-black transition-all shadow-xl shadow-slate-100">
                                <i data-lucide="shopping-cart"></i> Add To Cart
                            </button>
                            <a href="${product.flipkartLink}" target="_blank" class="border-2 border-sky-500 text-sky-600 px-10 py-5 rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-sky-50 transition-all">
                                <i data-lucide="external-link"></i> Buy on Flipkart
                            </a>
                        </div>

                        <div class="mt-12 pt-12 border-t border-slate-100 grid grid-cols-2 gap-6">
                            <div class="flex items-center gap-3 text-slate-600 font-bold text-sm">
                                <i data-lucide="truck" size="20"></i> Free Delivery
                            </div>
                            <div class="flex items-center gap-3 text-slate-600 font-bold text-sm">
                                <i data-lucide="shield-check" size="20"></i> Secure Checkout
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        });
    </script>
</body>
</html>
